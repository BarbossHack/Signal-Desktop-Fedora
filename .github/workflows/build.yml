name: build

on:
  push:
    # tags:
    #   - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}

    strategy:
      matrix:
        include:
          - name: fedora-42-x86_64
            runs-on: ubuntu-latest
            FEDORA_VERSION: 42
          - name: fedora-42-aarch64
            runs-on: ubuntu-24.04-arm
            FEDORA_VERSION: 42
          - name: fedora-43-x86_64
            runs-on: ubuntu-latest
            FEDORA_VERSION: 43
          - name: fedora-43-aarch64
            runs-on: ubuntu-24.04-arm
            FEDORA_VERSION: 43

    steps:
      - uses: actions/checkout@v6
      - run: make ENGINE=docker SIGNAL_VERSION=v8.6.1 FEDORA_VERSION=${{ matrix.FEDORA_VERSION }} # $GITHUB_REF_NAME
      - run: ls -lsah output/
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: output/*.rpm

