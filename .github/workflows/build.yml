name: build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: make ENGINE=docker SIGNAL_VERSION=$GITHUB_REF_NAME
      - run: sha256sum ./output/*.rpm > subject.checksums.txt
      - uses: actions/attest@v4
        with:
          subject-checksums: subject.checksums.txt
          predicate-type: "https://example.com/predicate/v1"
          predicate: "{}"
      - run: sed -i -E "s/[0-9]\.[0-9]{1,2}\.[0-9]/${GITHUB_REF_NAME#v}/g" .github/release-notes.md
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes-file ".github/release-notes.md"
      - name: Upload artifact to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" ./output/*.rpm --repo "$GITHUB_REPOSITORY"
