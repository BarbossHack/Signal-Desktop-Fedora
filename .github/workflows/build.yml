name: build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        fedora: [ 42, 43 ]
        runs-on: [ ubuntu-latest, ubuntu-24.04-arm ]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6
      - run: make ENGINE=docker SIGNAL_VERSION=${GITHUB_REF_NAME} FEDORA_VERSION=${{ matrix.fedora }}
      - run: |
          f=$(find output/ -name "*.rpm")
          base="$(basename ${f%.rpm})"
          IFS=_ read -r name version arch <<< "$base"
          mv "$f" "${name}_${version}_fc${{ matrix.fedora }}_${arch}.rpm"
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fc${{ matrix.fedora }}-${{ matrix.runs-on }}
          path: ./*.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY"
      - name: Upload artifact to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: find . -name "*.rpm" -exec gh release upload "${GITHUB_REF_NAME}" {} --repo "$GITHUB_REPOSITORY" \;
